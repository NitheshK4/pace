<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 110" width="800" height="110">
  <defs>
    <linearGradient id="tg1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C4DFF">
        <animate attributeName="stop-color" values="#7C4DFF;#00BCD4;#7C4DFF" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#00BCD4">
        <animate attributeName="stop-color" values="#00BCD4;#E040FB;#00BCD4" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="tg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00C853">
        <animate attributeName="stop-color" values="#00C853;#00BCD4;#00C853" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#00BCD4">
        <animate attributeName="stop-color" values="#00BCD4;#76FF03;#00BCD4" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="tg3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E040FB">
        <animate attributeName="stop-color" values="#E040FB;#FF5252;#E040FB" dur="3.5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#FF5252">
        <animate attributeName="stop-color" values="#FF5252;#FF9100;#FF5252" dur="3.5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="tg4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFAB40">
        <animate attributeName="stop-color" values="#FFAB40;#FFD740;#FFAB40" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#FFD740">
        <animate attributeName="stop-color" values="#FFD740;#FF6E40;#FFD740" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <rect width="800" height="110" rx="10" fill="#0D1117"/>

  <!-- Feature boxes -->
  <!-- Box 1: Cost Tracking -->
  <rect x="15" y="12" width="182" height="86" rx="8" fill="#161B22" stroke="#7C4DFF" stroke-width="1" opacity="0.9">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="106" y="40" text-anchor="middle" font-family="'SF Pro','Inter',sans-serif" font-size="22" font-weight="700" fill="url(#tg1)">💰 $1,247</text>
  <text x="106" y="62" text-anchor="middle" font-family="'SF Pro','Inter',sans-serif" font-size="11" fill="#8B949E" letter-spacing="1">TOTAL SPEND</text>
  <!-- Sparkline -->
  <polyline points="40,82 55,78 70,80 85,74 100,76 115,70 130,72 145,68 160,73" fill="none" stroke="url(#tg1)" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </polyline>

  <!-- Box 2: Requests -->
  <rect x="210" y="12" width="182" height="86" rx="8" fill="#161B22" stroke="#00C853" stroke-width="1" opacity="0.9">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.3s" repeatCount="indefinite"/>
  </rect>
  <text x="301" y="40" text-anchor="middle" font-family="'SF Pro','Inter',sans-serif" font-size="22" font-weight="700" fill="url(#tg2)">⚡ 48,392</text>
  <text x="301" y="62" text-anchor="middle" font-family="'SF Pro','Inter',sans-serif" font-size="11" fill="#8B949E" letter-spacing="1">REQUESTS</text>
  <polyline points="235,82 250,76 265,79 280,73 295,75 310,71 325,74 340,69 355,72" fill="none" stroke="url(#tg2)" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.3s" repeatCount="indefinite"/>
  </polyline>

  <!-- Box 3: Latency -->
  <rect x="405" y="12" width="182" height="86" rx="8" fill="#161B22" stroke="#E040FB" stroke-width="1" opacity="0.9">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.6s" repeatCount="indefinite"/>
  </rect>
  <text x="496" y="40" text-anchor="middle" font-family="'SF Pro','Inter',sans-serif" font-size="22" font-weight="700" fill="url(#tg3)">⏱ 342ms</text>
  <text x="496" y="62" text-anchor="middle" font-family="'SF Pro','Inter',sans-serif" font-size="11" fill="#8B949E" letter-spacing="1">AVG LATENCY</text>
  <polyline points="430,82 445,75 460,78 475,72 490,77 505,73 520,76 535,70 550,74" fill="none" stroke="url(#tg3)" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.6s" repeatCount="indefinite"/>
  </polyline>

  <!-- Box 4: Error Rate -->
  <rect x="600" y="12" width="182" height="86" rx="8" fill="#161B22" stroke="#FFAB40" stroke-width="1" opacity="0.9">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.1s" repeatCount="indefinite"/>
  </rect>
  <text x="691" y="40" text-anchor="middle" font-family="'SF Pro','Inter',sans-serif" font-size="22" font-weight="700" fill="url(#tg4)">🛡 0.8%</text>
  <text x="691" y="62" text-anchor="middle" font-family="'SF Pro','Inter',sans-serif" font-size="11" fill="#8B949E" letter-spacing="1">ERROR RATE</text>
  <polyline points="625,82 640,79 655,81 670,78 685,80 700,77 715,79 730,76 745,78" fill="none" stroke="url(#tg4)" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.1s" repeatCount="indefinite"/>
  </polyline>
</svg>
