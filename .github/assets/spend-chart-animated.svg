<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140" width="800" height="140">
  <defs>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C4DFF"/>
      <stop offset="50%" style="stop-color:#00BCD4"/>
      <stop offset="100%" style="stop-color:#E040FB"/>
    </linearGradient>
    <linearGradient id="sfill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7C4DFF;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7C4DFF;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="140" rx="10" fill="#0D1117"/>

  <!-- Title -->
  <text x="30" y="25" font-family="'SF Pro','Inter',sans-serif" font-size="11" fill="#7C4DFF" font-weight="600" letter-spacing="1">DAILY SPEND — LAST 30 DAYS</text>

  <!-- Y axis labels -->
  <text x="22" y="48" font-family="'SF Mono',monospace" font-size="9" fill="#484F58" text-anchor="end">$60</text>
  <text x="22" y="73" font-family="'SF Mono',monospace" font-size="9" fill="#484F58" text-anchor="end">$40</text>
  <text x="22" y="98" font-family="'SF Mono',monospace" font-size="9" fill="#484F58" text-anchor="end">$20</text>
  <text x="22" y="123" font-family="'SF Mono',monospace" font-size="9" fill="#484F58" text-anchor="end">$0</text>

  <!-- Grid lines -->
  <line x1="30" y1="44" x2="780" y2="44" stroke="#21262D" stroke-width="0.5"/>
  <line x1="30" y1="69" x2="780" y2="69" stroke="#21262D" stroke-width="0.5"/>
  <line x1="30" y1="94" x2="780" y2="94" stroke="#21262D" stroke-width="0.5"/>
  <line x1="30" y1="119" x2="780" y2="119" stroke="#21262D" stroke-width="0.5"/>

  <!-- Animated area chart fill -->
  <polygon points="30,119 55,108 80,112 105,95 130,100 155,88 180,92 205,78 230,82 255,70 280,75 305,65 330,72 355,60 380,68 405,55 430,62 455,50 480,58 505,48 530,55 555,45 580,52 605,42 630,50 655,44 680,48 705,42 730,46 755,40 780,45 780,119" fill="url(#sfill)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
  </polygon>

  <!-- Animated line chart - drawing effect -->
  <polyline points="30,119 55,108 80,112 105,95 130,100 155,88 180,92 205,78 230,82 255,70 280,75 305,65 330,72 355,60 380,68 405,55 430,62 455,50 480,58 505,48 530,55 555,45 580,52 605,42 630,50 655,44 680,48 705,42 730,46 755,40 780,45" fill="none" stroke="url(#sg)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="1200" stroke-dashoffset="1200">
    <animate attributeName="stroke-dashoffset" from="1200" to="0" dur="3s" fill="freeze" repeatCount="indefinite"/>
  </polyline>

  <!-- Animated cursor dot at end -->
  <circle cx="780" cy="45" r="4" fill="#E040FB">
    <animate attributeName="r" values="3;5;3" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- X axis labels -->
  <text x="30" y="133" font-family="'SF Mono',monospace" font-size="9" fill="#484F58">Jun 21</text>
  <text x="280" y="133" font-family="'SF Mono',monospace" font-size="9" fill="#484F58">Jun 28</text>
  <text x="530" y="133" font-family="'SF Mono',monospace" font-size="9" fill="#484F58">Jul 14</text>
  <text x="740" y="133" font-family="'SF Mono',monospace" font-size="9" fill="#484F58">Jul 21</text>
</svg>
