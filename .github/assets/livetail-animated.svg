<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" width="800" height="180">
  <defs>
    <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C4DFF">
        <animate attributeName="stop-color" values="#7C4DFF;#00BCD4;#7C4DFF" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#00BCD4">
        <animate attributeName="stop-color" values="#00BCD4;#E040FB;#00BCD4" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <rect width="800" height="180" rx="10" fill="#0D1117"/>

  <!-- Header -->
  <text x="30" y="30" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#7C4DFF" font-weight="600">● LIVE TAIL</text>
  <circle cx="790" cy="24" r="4" fill="#00C853">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Divider line -->
  <line x1="20" y1="40" x2="780" y2="40" stroke="#21262D" stroke-width="1"/>

  <!-- Column headers -->
  <text x="30" y="56" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#484F58">TIME</text>
  <text x="150" y="56" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#484F58">PROVIDER</text>
  <text x="280" y="56" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#484F58">MODEL</text>
  <text x="450" y="56" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#484F58">TOKENS</text>
  <text x="570" y="56" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#484F58">COST</text>
  <text x="650" y="56" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#484F58">LATENCY</text>
  <text x="740" y="56" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#484F58">STATUS</text>

  <line x1="20" y1="62" x2="780" y2="62" stroke="#21262D" stroke-width="1"/>

  <!-- Row 1 - fades in -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.1;0.2;1" dur="8s" repeatCount="indefinite"/>
    <rect x="20" y="66" width="760" height="24" rx="4" fill="#161B22"/>
    <text x="30" y="82" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#8B949E">14:32:01</text>
    <text x="150" y="82" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#A78BFA">openai</text>
    <text x="280" y="82" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#C9D1D9">gpt-4o</text>
    <text x="450" y="82" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#8B949E">1,200 → 400</text>
    <text x="570" y="82" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#00C853">$0.014</text>
    <text x="650" y="82" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#8B949E">342ms</text>
    <circle cx="748" cy="78" r="4" fill="#00C853"/>
    <text x="757" y="82" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#00C853">200</text>
  </g>

  <!-- Row 2 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;1;1" keyTimes="0;0.2;0.3;0.4;1" dur="8s" repeatCount="indefinite"/>
    <rect x="20" y="93" width="760" height="24" rx="4" fill="#0D1117"/>
    <text x="30" y="109" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#8B949E">14:32:03</text>
    <text x="150" y="109" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#F0B27A">anthropic</text>
    <text x="280" y="109" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#C9D1D9">claude-3-5-sonnet</text>
    <text x="450" y="109" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#8B949E">2,100 → 850</text>
    <text x="570" y="109" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#00C853">$0.019</text>
    <text x="650" y="109" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#8B949E">512ms</text>
    <circle cx="748" cy="105" r="4" fill="#00C853"/>
    <text x="757" y="109" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#00C853">200</text>
  </g>

  <!-- Row 3 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;1;1" keyTimes="0;0.35;0.45;0.5;0.6;1" dur="8s" repeatCount="indefinite"/>
    <rect x="20" y="120" width="760" height="24" rx="4" fill="#161B22"/>
    <text x="30" y="136" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#8B949E">14:32:04</text>
    <text x="150" y="136" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#A78BFA">openai</text>
    <text x="280" y="136" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#C9D1D9">gpt-4o-mini</text>
    <text x="450" y="136" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#8B949E">300 → 120</text>
    <text x="570" y="136" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#00C853">$0.001</text>
    <text x="650" y="136" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#8B949E">189ms</text>
    <circle cx="748" cy="132" r="4" fill="#00C853"/>
    <text x="757" y="136" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#00C853">200</text>
  </g>

  <!-- Row 4 - Rate limited! -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;0;1;1" keyTimes="0;0.5;0.6;0.65;0.7;0.8;1" dur="8s" repeatCount="indefinite"/>
    <rect x="20" y="147" width="760" height="24" rx="4" fill="#1a0a0a"/>
    <text x="30" y="163" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#8B949E">14:32:06</text>
    <text x="150" y="163" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#A78BFA">openai</text>
    <text x="280" y="163" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#C9D1D9">gpt-4o</text>
    <text x="450" y="163" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#8B949E">1,800 → 0</text>
    <text x="570" y="163" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#484F58">—</text>
    <text x="650" y="163" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#FF5252">298ms</text>
    <circle cx="748" cy="159" r="4" fill="#FF5252">
      <animate attributeName="opacity" values="1;0.4;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <text x="757" y="163" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#FF5252">429</text>
  </g>
</svg>
