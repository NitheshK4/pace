[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "pace-sdk"
version = "0.1.0"
description = "Pace LLM Observability Python SDK"
authors = [{name = "Pace Team"}]
requires-python = ">=3.9"
dependencies = [
    "httpx>=0.25.0",
    "pydantic>=2.0.0"
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "openai>=1.0.0",
    "anthropic>=0.18.0"
]

[tool.setuptools.packages.find]
where = ["."]
include = ["pace*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
